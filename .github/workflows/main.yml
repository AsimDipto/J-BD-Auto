name: JBD Auto Update

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Extract and Install
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        sudo apt-get install -y unzip
        unzip -o -P "$ZIP_PASS" jbd.zip -d .
        if [ -f jbd.zip ]; then unzip -o -P "$ZIP_PASS" jbd.zip -d .; fi
        pip install requests beautifulsoup4
    - name: Generate Playlist
      run: python main.py

    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Unstaged changes stash kore pull korbe jate error na ashe
        git add Fuck-you-Ankita.m3u
        git stash
        git pull --rebase origin main
        git stash pop || true
        
        # Final push
        git add Fuck-you-Ankita.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update" && git push)
