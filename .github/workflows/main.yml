name: Update M3U8 Playlist

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Quick Setup
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        sudo apt-get install -y unzip
        pip install requests beautifulsoup4
        unzip -o -P "$ZIP_PASS" jbd.zip -d .
        if [ -f jbd.zip ]; then unzip -o -P "$ZIP_PASS" jbd.zip -d .; fi

    - name: Run Script
      run: python main.py

    - name: Fast Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add Fuck-you-Ankita.m3u
        git commit -m "Auto-update" || exit 0
        git pull --rebase origin main
        git push
