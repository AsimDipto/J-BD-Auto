name: Update M3U8 Playlist

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get install -y unzip
        python -m pip install --upgrade pip
        pip install requests

    - name: Extract JBD Zip
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        unzip -o -P "$ZIP_PASS" jbd.zip -d .
        if [ -f jbd.zip ]; then unzip -o -P "$ZIP_PASS" jbd.zip -d .; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Generate Playlist
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add Fuck-you-Ankita.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update playlist" && git push)
