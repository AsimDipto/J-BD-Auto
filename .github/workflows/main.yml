name: Update M3U8 Playlist

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Extract and Install
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        sudo apt-get install -y unzip
        # Prothom unzip
        unzip -o -P "$ZIP_PASS" jbd.zip -d .
        # Jodi vitore arekta jbd.zip thake
        if [ -f jbd.zip ]; then unzip -o -P "$ZIP_PASS" jbd.zip -d .; fi
        
        # Requirements install kora
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install requests beautifulsoup4
        fi

    - name: Generate Playlist
      run: python main.py

    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add Fuck-you-Ankita.m3u
        git pull --rebase origin main
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update" && git push)
